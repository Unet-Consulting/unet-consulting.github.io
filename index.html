<body class="page page--home">
  <header class="site-header">
    <div class="shell shell--nav">
      <a href="/" class="brand">
        <img src="/assets/logo_en.svg" alt="Unet Consulting logo" class="brand__logo" />
      </a>
      <nav class="nav">
        <a href="/#home" class="nav__link" data-i18n="nav.home"></a>
        <a href="/#about" class="nav__link" data-i18n="nav.about"></a>
        <a href="/#clients" class="nav__link" data-i18n="nav.clients"></a>
        <a href="/services/" class="nav__link" data-i18n="nav.services"></a>
        <a href="/team/" class="nav__link" data-i18n="nav.team"></a>
        <a href="/contact/" class="nav__link" data-i18n="nav.contact"></a>
      </nav>
      <div class="lang-toggle" aria-label="Language toggle">
        <button class="lang-toggle__btn" data-lang="en" type="button">EN</button>
        <span class="lang-toggle__divider">/</span>
        <button class="lang-toggle__btn" data-lang="mn" type="button">MN</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero section--dark" id="hero">
      <img class="hero__source" src="/assets/pictures/hero-3.jpg" alt="" aria-hidden="true" hidden />
      <div class="hero__overlay"></div>
      <div class="hero__inner hero__inner--home-stack">
        <div class="home-stack">
          <section class="home-section home-section--home home-section--active" id="home">
            <div class="hero__content">
              <p class="hero__kicker" data-i18n="home.hero.kicker"></p>
              <h1 class="hero__title" data-i18n="home.hero.title"></h1>
            </div>
          </section>
          <section class="home-section home-section--about" id="about">
            <div class="about-hero-content">
              <div class="about-hero-intro">
                <h1 class="about-hero-intro__title" data-i18n="about.hero.title"></h1>
                <p class="about-hero-intro__subtitle" data-i18n="about.hero.subtitle"></p>
              </div>
              <div class="about-pillars">
                <article class="about-pillar">
                  <img class="about-pillar__icon" src="/assets/items/slogan.svg" alt="" aria-hidden="true" />
                  <h2 class="about-pillar__title" data-i18n="about.hero.slogan.title"></h2>
                  <p class="about-pillar__body" data-i18n="about.hero.slogan.body"></p>
                </article>
                <article class="about-pillar">
                  <img class="about-pillar__icon" src="/assets/items/vision.svg" alt="" aria-hidden="true" />
                  <h2 class="about-pillar__title" data-i18n="about.hero.vision.title"></h2>
                  <p class="about-pillar__body" data-i18n="about.hero.vision.body"></p>
                </article>
                <article class="about-pillar">
                  <img class="about-pillar__icon" src="/assets/items/mission.svg" alt="" aria-hidden="true" />
                  <h2 class="about-pillar__title" data-i18n="about.hero.mission.title"></h2>
                  <p class="about-pillar__body" data-i18n="about.hero.mission.body"></p>
                </article>
              </div>
            </div>
          </section>
          <section class="home-section home-section--clients" id="clients">
            <div class="clients-logo-panel">
              <h1 class="clients-logo-title" data-i18n="clients.section.title"></h1>
              <div class="clients-logo-grid" data-logo-grid aria-live="polite"></div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="shell site-footer__inner">
      <p class="site-footer__left">
        &copy; <span data-current-year></span> <span data-i18n="brand.fullname"></span>
      </p>
      <p class="site-footer__right" data-i18n="footer.developedBy"></p>
    </div>
  </footer>
</body>

</html>
