<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Unet Consulting — Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/scripts.js"></script>
</head>

<body class="page page--contact">
    <header class="site-header">
        <div class="shell shell--nav">
            <a href="/" class="brand">
                <img src="/assets/logo_en.svg" alt="Unet Consulting logo" class="brand__logo" />
            </a>
            <nav class="nav">
                <a href="/#home" class="nav__link" data-i18n="nav.home"></a>
                <a href="/#about" class="nav__link" data-i18n="nav.about"></a>
                <a href="/#clients" class="nav__link" data-i18n="nav.clients"></a>
                <a href="/services/" class="nav__link" data-i18n="nav.services"></a>
                <a href="/team/" class="nav__link" data-i18n="nav.team"></a>
                <a href="/contact/" class="nav__link" data-i18n="nav.contact"></a>
            </nav>
            <div class="lang-toggle" aria-label="Language toggle">
                <button class="lang-toggle__btn" data-lang="en" type="button">EN</button>
                <span class="lang-toggle__divider">/</span>
                <button class="lang-toggle__btn" data-lang="mn" type="button">MN</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero section--dark" id="hero">
            <img class="hero__source" src="/assets/pictures/hero-1.jpg" alt="" aria-hidden="true" hidden />
            <div class="hero__overlay"></div>
            <div class="hero__inner">
                <div class="contact-page-content">
                    <h1 class="contact-page-title" data-i18n="contact.page.title"></h1>
                    <div class="contact-layout">
                        <section class="contact-info-card" data-i18n-aria-label="contact.section.info.aria">
                            <div class="contact-list">
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M9.197 8.562h-1.16V13.5H6.03V8.562H5V6.854h1.03v-1.22C6.03 4.38 6.585 3.5 8.206 3.5h1.353v1.708h-.846c-.633 0-.676.236-.676.678l-.002.968h1.533z" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.facebook.label"></p>
                                        <p class="contact-list__value"><a
                                                href="https://www.facebook.com/profile.php?id=61585662596237"
                                                target="_blank" rel="noopener noreferrer"
                                                data-i18n="contact.info.facebook.value"></a>
                                        </p>
                                    </div>
                                </div>
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M8 5.26A2.74 2.74 0 1 0 8 10.74 2.74 2.74 0 0 0 8 5.26m0 4.51A1.77 1.77 0 1 1 8 6.23a1.77 1.77 0 0 1 0 3.54" />
                                            <path
                                                d="M11.18 1.5H4.82A3.32 3.32 0 0 0 1.5 4.82v6.36A3.32 3.32 0 0 0 4.82 14.5h6.36a3.32 3.32 0 0 0 3.32-3.32V4.82A3.32 3.32 0 0 0 11.18 1.5m2.35 9.68a2.35 2.35 0 0 1-2.35 2.35H4.82a2.35 2.35 0 0 1-2.35-2.35V4.82a2.35 2.35 0 0 1 2.35-2.35h6.36a2.35 2.35 0 0 1 2.35 2.35z" />
                                            <circle cx="11.3" cy="4.7" r=".8" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.instagram.label"></p>
                                        <p class="contact-list__value"><a
                                                href="https://www.instagram.com/unetconsulting.mn" target="_blank"
                                                rel="noopener noreferrer" data-i18n="contact.info.instagram.value"></a>
                                        </p>
                                    </div>
                                </div>
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M13.5 13.5h-2.07V10.2c0-.79-.01-1.81-1.1-1.81-1.11 0-1.28.87-1.28 1.75v3.36H6.98V6.71h1.98v.92H9c.28-.52.95-1.09 1.96-1.09 2.1 0 2.5 1.39 2.5 3.19zM4.66 5.8a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4m1.03 7.7H3.62V6.71h2.07z" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.linkedin.label"></p>
                                        <p class="contact-list__value"><a
                                                href="https://www.linkedin.com/in/unet-consulting-llc-348944397/"
                                                target="_blank" rel="noopener noreferrer"
                                                data-i18n="contact.info.linkedin.value"></a>
                                        </p>
                                    </div>
                                </div>
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M3.65 1.33a.68.68 0 0 1 .7-.16l2.1.7c.26.09.43.35.4.62l-.2 1.86a.68.68 0 0 1-.5.58l-1.1.27a11.5 11.5 0 0 0 5.75 5.75l.27-1.1a.68.68 0 0 1 .58-.5l1.86-.2a.68.68 0 0 1 .62.4l.7 2.1a.68.68 0 0 1-.16.7l-1.27 1.27c-.22.22-.54.31-.84.24-2.2-.54-4.26-1.73-6.1-3.57C4.8 8.45 3.6 6.4 3.07 4.2a.95.95 0 0 1 .24-.84z" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.phone.label"></p>
                                        <p class="contact-list__value" data-i18n="contact.info.phone.value"></p>
                                    </div>
                                </div>
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M.8 3.2A1.2 1.2 0 0 1 2 2h12a1.2 1.2 0 0 1 1.2 1.2v9.6A1.2 1.2 0 0 1 14 14H2a1.2 1.2 0 0 1-1.2-1.2zm1.3.08 5.64 4.1a.44.44 0 0 0 .52 0l5.64-4.1A.24.24 0 0 0 13.76 3H2.24a.24.24 0 0 0-.14.28m11.8 1.18L9.02 7.95a1.42 1.42 0 0 1-2.04 0L2.1 4.46V12.8c0 .13.1.23.23.23h11.34a.23.23 0 0 0 .23-.23z" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.email.label"></p>
                                        <p class="contact-list__value"><a href="mailto:consulting@unet.mn"
                                                data-i18n="contact.info.email.value"></a></p>
                                    </div>
                                </div>
                                <div class="contact-list__item">
                                    <span class="contact-list__icon" aria-hidden="true">
                                        <svg viewBox="0 0 16 16" fill="currentColor">
                                            <path
                                                d="M8 1.5a4.5 4.5 0 0 0-4.5 4.5c0 3.3 4.5 8.5 4.5 8.5s4.5-5.2 4.5-8.5A4.5 4.5 0 0 0 8 1.5m0 6.1a1.6 1.6 0 1 1 0-3.2 1.6 1.6 0 0 1 0 3.2" />
                                        </svg>
                                    </span>
                                    <div class="contact-list__content">
                                        <p class="contact-list__label" data-i18n="contact.info.address.label"></p>
                                        <p class="contact-list__value" data-i18n="contact.info.address.value"
                                            data-i18n-break="pipe"></p>
                                    </div>
                                </div>
                            </div>
                        </section>
                        <section class="contact-map-card" data-i18n-aria-label="contact.section.map.aria">
                            <iframe class="contact-map"
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4390.570126093678!2d106.9144127!3d47.91636450000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5d969245919f9f71%3A0xcc41a25f7448166c!2sEco%20International%20Tower!5e1!3m2!1sen!2smn!4v1773392533497!5m2!1sen!2smn"
                                width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </section>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
