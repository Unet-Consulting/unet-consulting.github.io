<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blackstone Consulting — 404</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/scripts.js"></script>
</head>

<body class="page page--404">
    <header class="site-header">
        <div class="shell shell--nav">

                <img src="/assets/logo_en.svg" alt="Unet Consulting logo" class="brand__logo" />
            </a>
            <nav class="nav">

            <div class="lang-toggle" aria-label="Language toggle">
                <button class="lang-toggle__btn" data-lang="en" type="button">EN</button>
                <span class="lang-toggle__divider">/</span>
                <button class="lang-toggle__btn" data-lang="mn" type="button">MN</button>

    <main>
        <section class="section section--dark section--full-height section--centered">
            <div class="shell">
                <div class="not-found">

                    <h1 class="not-found__title" data-i18n="404.title"></h1>
