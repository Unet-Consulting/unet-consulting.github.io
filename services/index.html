<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Unet Consulting — Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/scripts.js"></script>
</head>

<body class="page page--services">
    <header class="site-header">
        <div class="shell shell--nav">
            <a href="/" class="brand">
                <img src="/assets/logo_en.svg" alt="Unet Consulting logo" class="brand__logo" />
            </a>
            <nav class="nav">
                <a href="/#home" class="nav__link" data-i18n="nav.home"></a>
                <a href="/#about" class="nav__link" data-i18n="nav.about"></a>
                <a href="/#clients" class="nav__link" data-i18n="nav.clients"></a>
                <a href="/services" class="nav__link" data-i18n="nav.services"></a>
                <a href="/team" class="nav__link" data-i18n="nav.team"></a>
                <a href="/contact" class="nav__link" data-i18n="nav.contact"></a>
            </nav>
            <div class="lang-toggle" aria-label="Language toggle">
                <button class="lang-toggle__btn" data-lang="en" type="button">EN</button>
                <span class="lang-toggle__divider">/</span>
                <button class="lang-toggle__btn" data-lang="mn" type="button">MN</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero section--dark" id="hero">
            <img class="hero__source" src="/assets/pictures/hero-2.jpg" alt="" aria-hidden="true" hidden />
            <div class="hero__overlay"></div>
            <div class="hero__inner">
                <div class="services-hero-content">
                    <div class="services-hero-intro">
                        <h1 class="services-hero-intro__title" data-i18n="services.hero.title"></h1>
                    </div>
                    <div class="services-pillars-block">
                        <h2 class="services-pillars-block__title" data-i18n="services.pillars.title"></h2>
                        <p class="services-pillars-block__subtitle" data-i18n="services.hero.subtitle"></p>
                        <div class="services-pillars">
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/strategy.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.strategy.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.strategy.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/finance.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.finance.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.finance.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/management.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.management.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.management.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/it.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.it.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.it.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/research.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.research.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.research.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/sales.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.pillar.sales.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.pillar.sales.body"></p>
                            </article>
                        </div>
                    </div>
                    <div class="services-pillars-block services-pillars-block--standard">
                        <h2 class="services-pillars-block__title" data-i18n="services.standard.title"></h2>
                        <p class="services-pillars-block__subtitle" data-i18n="services.standard.subtitle"></p>
                        <div class="services-pillars services-pillars--standard">
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/clevel.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.standard.pillar.1.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.standard.pillar.1.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/finance2.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.standard.pillar.2.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.standard.pillar.2.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/tender.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.standard.pillar.3.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.standard.pillar.3.body"></p>
                            </article>
                            <article class="services-pillar">
                                <img class="services-pillar__icon" src="/assets/items/training.svg" alt=""
                                    aria-hidden="true" />
                                <h2 class="services-pillar__title" data-i18n="services.standard.pillar.4.title"></h2>
                                <p class="services-pillar__body" data-i18n="services.standard.pillar.4.body"></p>
                            </article>
                        </div>
                    </div>
                </div>
            </div>
        </section>



    </main>
</body>

</html>
